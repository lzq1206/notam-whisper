name: Update MSI Warnings

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-msi:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3

      - name: Pull latest changes
        run: git pull --rebase origin main

      - name: Fetch MSI maritime warnings
        run: python fetch_msi.py

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[Auto] Update msi.csv, msi_raw.csv, msi.kml and history"
          file_pattern: "msi.csv msi_raw.csv msi.kml history/msi/* msi_fetch_log.txt"
          branch: main
