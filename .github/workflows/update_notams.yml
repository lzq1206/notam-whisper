name: Update NOTAMs

on:
  schedule:
    - cron: '0 */12 * * *' # Run at 00:00 and 12:00 UTC every day
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update-notams:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch and filter aerospace NOTAMs
        run: python fetch_notams.py

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[Auto] Update latest.csv, latest.kml and weekly history"
          file_pattern: "latest.csv latest.kml history/*"
          branch: main
