name: Update NOTAMs

on:
  push:
    branches: [ main ]
    paths:
      - 'fetch_notams.py'
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-notams:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch aerospace NOTAMs
        run: python fetch_notams.py

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[Auto] Update notams.csv, notams.kml and history"
          file_pattern: "notams.csv notams.kml history/notams/*"
          branch: main
