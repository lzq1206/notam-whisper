<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NOTAM 发射区域 Viewer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body, #map { height: 100%; margin: 0; }
    .panel {
      position: absolute; z-index: 1000; top: 10px; left: 10px;
      background: #fff; padding: 10px 12px; border-radius: 8px;
      box-shadow: 0 2px 10px rgba(0,0,0,.2); font: 13px/1.4 sans-serif;
      min-width: 320px;
    }
    .panel input, .panel button { font-size: 12px; margin-top: 4px; }
    .legend {
      margin-top: 6px; font-size: 12px;
      background: linear-gradient(90deg, #ff2b2b, #2b5bff);
      height: 10px; border-radius: 5px;
    }
    .row { display: flex; gap: 8px; align-items: center; }
    .small { font-size: 11px; color: #555; }
  </style>
</head>
<body>
  <div class="panel">
    <div><b>发射相关 NOTAM 地图</b></div>
    <div class="small">红(近) → 蓝(远)</div>
    <div class="legend"></div>

    <div style="margin-top:8px;">
      <label>开始日期：</label><br/>
      <input id="startDate" type="date" />
    </div>
    <div>
      <label>结束日期：</label><br/>
      <input id="endDate" type="date" />
    </div>
    <div class="row" style="margin-top:6px;">
      <button id="applyBtn">应用筛选</button>
      <button id="resetBtn">重置</button>
    </div>

    <div class="small" style="margin-top:6px;">
      数据文件：<code>latest.csv</code>（优先） / <code>latest.kml</code>（回退）
    </div>
    <div class="small" id="status"></div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js"></script>
  <script>
    const map = L.map('map', { zoomControl: false }).setView([34.5, 108.5], 4);
    L.control.zoom({ position: 'topright' }).addTo(map);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const statusEl = document.getElementById('status');
    const startEl = document.getElementById('startDate');
    const endEl = document.getElementById('endDate');
    const applyBtn = document.getElementById('applyBtn');
    const resetBtn = document.getElementById('resetBtn');

    let dataRows = [];
    let layers = [];

    function setStatus(txt) { statusEl.textContent = txt; }

    function parseCsv(text) {
      const lines = text.trim().split(/\r?\n/);
      if (lines.length < 2) return [];
      const headers = lines[0].split(',');
      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        const line = lines[i];
        // 简单CSV解析（处理双引号）
        const vals = [];
        let cur = '', inQ = false;
        for (let j = 0; j < line.length; j++) {
          const ch = line[j];
          if (ch === '"') {
            if (inQ && line[j+1] === '"') { cur += '"'; j++; }
            else inQ = !inQ;
          } else if (ch === ',' && !inQ) {
            vals.push(cur); cur = '';
          } else cur += ch;
        }
        vals.push(cur);
        const o = {};
        headers.forEach((h, idx) => o[h.replace(/^\ufeff/, '')] = vals[idx] ?? '');
        rows.push(o);
      }
      return rows;
    }

    function colorByTime(fromTs, minTs, maxTs) {
      if (!isFinite(fromTs) || !isFinite(minTs) || !isFinite(maxTs) || maxTs <= minTs) return '#d33';
      const t = (fromTs - minTs) / (maxTs - minTs); // 0近 1远
      const r = Math.round(255 * (1 - t) + 43 * t);
      const g = Math.round(43 * (1 - t) + 91 * t);
      const b = Math.round(43 * (1 - t) + 255 * t);
      return `rgb(${r},${g},${b})`;
    }

    function parseCoordinate(s, isLon) {
      let parts = s.split('.');
      let intPart = parts[0];
      let decPart = parts.length > 1 ? '.' + parts[1] : '';
      
      let d, m, sec = '0';
      if (isLon) {
        if (intPart.length === 4 || intPart.length === 5) {
          m = intPart.slice(-2) + decPart;
          d = intPart.slice(0, -2);
        } else if (intPart.length === 6 || intPart.length === 7) {
          sec = intPart.slice(-2) + decPart;
          m = intPart.slice(-4, -2);
          d = intPart.slice(0, -4);
        } else return null;
      } else {
        if (intPart.length === 3 || intPart.length === 4) {
          m = intPart.slice(-2) + decPart;
          d = intPart.slice(0, -2);
        } else if (intPart.length === 5 || intPart.length === 6) {
          sec = intPart.slice(-2) + decPart;
          m = intPart.slice(-4, -2);
          d = intPart.slice(0, -4);
        } else return null;
      }
      if (d === '') d = '0';
      return parseFloat(d) + parseFloat(m)/60 + parseFloat(sec)/3600;
    }

    function extractPolygonFromRaw(raw) {
      if (!raw) return [];
      // Remove Q-line to avoid mistakenly parsing the center coordinate
      let cleanedRaw = raw.replace(/Q\).*?(?=\s*A\))/s, '');

      // Normalize space-separated coordinates like "25 41 S" to "2541S" or "S 25 41" to "S2541"
      cleanedRaw = cleanedRaw
        .replace(/\b(\d{2,3})\s+(\d{2}(?:[.,]\d+)?)(?:\s+(\d{2}(?:[.,]\d+)?))?\s*([NSEW])\b/gi, (match, d, m, s, hemi) => {
          return d + m + (s || '') + hemi.toUpperCase();
        })
        .replace(/(^|[\s,-])([NSEW])\s*(\d{2,3})\s+(\d{2}(?:[.,]\d+)?)(?:\s+(\d{2}(?:[.,]\d+)?))?\b/gi, (match, pref, hemi, d, m, s) => {
          return pref + hemi.toUpperCase() + d + m + (s || '');
        });

      const regex = /(?:([NS])\s*(\d{4,6}(?:[.,]\d+)?))\s*(?:([EW])\s*(\d{5,7}(?:[.,]\d+)?))|(?:(\d{4,6}(?:[.,]\d+)?)\s*([NS]))\s*(?:(\d{5,7}(?:[.,]\d+)?)\s*([EW]))/gi;
      const matches = [...cleanedRaw.matchAll(regex)];
      if (matches.length < 3) return [];
      
      const groups = {};
      
      for (const m of matches) {
        let isHemiFirst = !!m[1];
        let latHemi = (m[1] || m[6]).toUpperCase();
        let latStr  = (m[2] || m[5]).replace(',', '.');
        let lonHemi = (m[3] || m[8]).toUpperCase();
        let lonStr  = (m[4] || m[7]).replace(',', '.');
        
        let latIntLen = latStr.split('.')[0].length;
        let lonIntLen = lonStr.split('.')[0].length;
        
        // Q-line center point is always DDMM/DDDMM (<=4 / <=5). Polygons are often DDMMSS/DDDMMSS (>4 / >5).
        let latType = (latIntLen > 4) ? 'SEC' : 'MIN';
        let lonType = (lonIntLen > 5) ? 'SEC' : 'MIN';
        let matchType = (isHemiFirst ? 'PRE' : 'SUF') + '_' + latType + '_' + lonType;
        
        let latObj = parseCoordinate(latStr, false);
        let lonObj = parseCoordinate(lonStr, true);
        if (latObj === null || lonObj === null) continue;
        
        let lat = latObj;
        if (latHemi === 'S') lat = -lat;
        
        let lon = lonObj;
        if (lonHemi === 'W') lon = -lon;
        
        if (!groups[matchType]) groups[matchType] = [];
        groups[matchType].push({ lat: lat, lon: lon, index: m.index });
      }
      
      let maxLen = 0;
      let bestGroup = [];
      let allValidSubGroups = [];
      for (const t in groups) {
        let currentSubGroup = [];
        let lastIndex = -1;
        
        for (const pt of groups[t]) {
          // If distance between start of coordinates is too large (> 150 chars), they are likely unrelated scattered points
          if (lastIndex === -1 || (pt.index - lastIndex) < 150) {
            currentSubGroup.push([pt.lat, pt.lon]);
          } else {
            if (currentSubGroup.length >= 2) {
              allValidSubGroups.push(currentSubGroup);
            }
            currentSubGroup = [[pt.lat, pt.lon]];
          }
          lastIndex = pt.index;
        }
        
        if (currentSubGroup.length >= 2) {
          allValidSubGroups.push(currentSubGroup);
        }
      }
      
      return allValidSubGroups;
    }

    function clearLayers() {
      layers.forEach(l => map.removeLayer(l));
      layers = [];
    }

    function renderRows(rows) {
      clearLayers();
      if (!rows.length) {
        setStatus('当前筛选无数据');
        return;
      }

      const times = rows.map(r => Date.parse(r.from_utc)).filter(Number.isFinite);
      const minTs = Math.min(...times), maxTs = Math.max(...times);

      const group = L.featureGroup();
      rows.forEach(r => {
        const lat = parseFloat(r.lat), lon = parseFloat(r.lon);
        const radiusNm = Math.max(1, parseFloat(r.radius_nm || '1'));
        if (!isFinite(lat) || !isFinite(lon)) return;
        const color = colorByTime(Date.parse(r.from_utc), minTs, maxTs);

        let coordinatesList = [];
        if (r.polygon) {
          try {
            if (r.polygon.trim().startsWith('[')) {
              let parsed = JSON.parse(r.polygon);
              if (parsed.length > 0) {
                if (typeof parsed[0][0] === 'number') {
                  coordinatesList.push(parsed);
                } else {
                  coordinatesList = parsed;
                }
              }
            } else {
              const pts = r.polygon.split(/[ ;|]/).filter(Boolean);
              let coords = pts.map(p => {
                const parts = p.split(',');
                return [parseFloat(parts[0]), parseFloat(parts[1])];
              }).filter(p => isFinite(p[0]) && isFinite(p[1]));
              if (coords.length >= 2) coordinatesList.push(coords);
            }
          } catch(e) {}
        }
        
        // Fallback to extracting from raw text
        let isFromRawExtracted = false;
        if (coordinatesList.length === 0) {
          coordinatesList = extractPolygonFromRaw(r.raw);
          isFromRawExtracted = true;
        }

        const popup = `
          <b>${r.notam_id || ''}</b><br/>
          FIR: ${r.fir || ''}<br/>
          from: ${r.from_utc || ''}<br/>
          to: ${r.to_utc || ''}<br/>
          qcode: ${r.qcode || ''}<br/>
          <hr/>
          <div style="max-width:420px;max-height:260px;overflow:auto;white-space:pre-wrap;">${(r.raw || '').replace(/</g,'&lt;')}</div>
        `;

        if (coordinatesList.length > 0) {
          // Determine if this is a route (contains RTE/AWY keywords and not AREA/POLYGON)
          const rawText = r.raw || '';
          const isRoute = /RTE\b|ROUTE\b|AWY\b|TRACK\b|CORRIDOR\b/i.test(rawText) && !/AREA\b|POLYGON\b|BOUNDED\b/i.test(rawText);
          
          coordinatesList.forEach(pts => {
            let shape;
            if (pts.length >= 3 && !isRoute) {
              shape = L.polygon(pts, {
                color,
                fillColor: color,
                fillOpacity: 0.2,
                weight: 2
              });
            } else if (pts.length >= 2) {
              shape = L.polyline(pts, {
                color,
                weight: 3
              });
            }
            if (shape) {
              shape.bindPopup(popup);
              shape.addTo(group);
              layers.push(shape);
            }
          });
        } else {
          let shape = L.circle([lat, lon], {
            radius: radiusNm * 1852,
            color,
            fillColor: color,
            fillOpacity: 0.2,
            weight: 2
          });
          shape.bindPopup(popup);
          shape.addTo(group);
          layers.push(shape);
        }
      });

      if (layers.length) {
        group.addTo(map);
        try { map.fitBounds(group.getBounds(), {padding: [20,20]}); } catch (e) {}
      }
      setStatus(`已加载 ${rows.length} 条发射相关 NOTAM`);
    }

    function isoDate(d){ return d.toISOString().slice(0,10); }
    function plusDays(dateStr, n){
      const d = new Date(dateStr + 'T00:00:00Z');
      d.setUTCDate(d.getUTCDate() + n);
      return isoDate(d);
    }

    function askStartDateDefault(){
      const remembered = localStorage.getItem('notam_start_date') || '';
      const fallback = remembered || isoDate(new Date());
      const v = prompt('请输入开始日期（YYYY-MM-DD）', fallback);
      if (v && /^\d{4}-\d{2}-\d{2}$/.test(v)) {
        startEl.value = v;
        endEl.value = plusDays(v, 5);
        localStorage.setItem('notam_start_date', v);
      } else if (fallback && /^\d{4}-\d{2}-\d{2}$/.test(fallback)) {
        startEl.value = fallback;
        endEl.value = plusDays(fallback, 5);
      }
    }

    function applyFilter() {
      if (!dataRows.length) return;
      const s = startEl.value ? new Date(startEl.value + 'T00:00:00Z').getTime() : -Infinity;
      const e = endEl.value ? new Date(endEl.value + 'T23:59:59Z').getTime() : Infinity;
      const filtered = dataRows.filter(r => {
        const t = Date.parse(r.from_utc || '');
        return isFinite(t) && t >= s && t <= e;
      });
      if (startEl.value) localStorage.setItem('notam_start_date', startEl.value);
      renderRows(filtered);
    }

    applyBtn.addEventListener('click', applyFilter);
    resetBtn.addEventListener('click', () => {
      startEl.value = '';
      endEl.value = '';
      renderRows(dataRows);
    });

    async function loadCsvFirst() {
      try {
        const resp = await fetch('./latest.csv', {cache: 'no-store'});
        if (!resp.ok) throw new Error('latest.csv not found');
        const text = await resp.text();
        dataRows = parseCsv(text);
        if (!dataRows.length) throw new Error('csv empty');

        // 默认开始日期：询问用户；结束日期自动=开始+5天
        askStartDateDefault();
        applyFilter();
        return true;
      } catch (e) {
        console.warn('CSV load failed, fallback KML', e);
        return false;
      }
    }

    async function loadKmlFallback() {
      const layer = omnivore.kml('./latest.kml').on('ready', function() {
        try { map.fitBounds(layer.getBounds(), {padding: [20,20]}); } catch(e) {}
        setStatus('CSV不可用，已回退显示 latest.kml');
      }).on('error', function(e){
        console.error(e);
        setStatus('latest.csv / latest.kml 均加载失败');
      }).addTo(map);
      layers.push(layer);
    }

    (async () => {
      const ok = await loadCsvFirst();
      if (!ok) await loadKmlFallback();
    })();
  </script>
</body>
</html>
