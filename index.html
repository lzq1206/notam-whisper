<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NOTAM / MSI / 火箭发射 地图</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>
  <style>
    html,
    body,
    #map,
    #mapCesium {
      height: 100%;
      margin: 0;
    }

    #mapCesium {
      display: none;
      background: #000;
    }

    .view-toggle {
      position: absolute;
      bottom: 30px;
      right: 10px;
      z-index: 1000;
      background: #fff;
      padding: 8px 12px;
      border-radius: 20px;
      box-shadow: 0 2px 10px rgba(0, 0, 0, .2);
      cursor: pointer;
      font: bold 12px sans-serif;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .panel {
      position: absolute;
      z-index: 1000;
      top: 10px;
      left: 10px;
      background: #fff;
      padding: 10px 12px;
      border-radius: 8px;
      box-shadow: 0 2px 10px rgba(0, 0, 0, .2);
      font: 13px/1.4 sans-serif;
      min-width: 320px;
      transition: all 0.3s ease;
    }

    .panel.collapsed {
      min-width: 0;
      width: 40px;
      height: 40px;
      padding: 0;
      overflow: hidden;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .panel.collapsed .panel-content {
      display: none;
    }

    .panel-toggle {
      position: absolute;
      top: 10px;
      right: 10px;
      cursor: pointer;
      font-weight: bold;
      background: #eee;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .panel.collapsed .panel-toggle {
      position: static;
      font-size: 18px;
      background: none;
      padding: 0;
    }

    .panel input,
    .panel button {
      font-size: 12px;
      margin-top: 4px;
    }

    .legend {
      margin-top: 6px;
      font-size: 12px;
      background: linear-gradient(90deg, #ff2b2b, #2b5bff);
      height: 10px;
      border-radius: 5px;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .small {
      font-size: 11px;
      color: #555;
    }

    .launch-layer-toggle {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-launches {
      margin-top: 4px;
      font-size: 12px;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 3px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .glow-path {
      filter: drop-shadow(0 0 12px rgba(255, 255, 0, 0.8)) drop-shadow(0 0 4px rgba(255, 255, 0, 1));
    }
  </style>
</head>

<body>
  <div class="panel collapsed" id="mainPanel">
    <div class="panel-toggle" id="panelToggle">☰</div>
    <div class="panel-content">
      <div><b>发射相关 NOTAM 地图</b></div>
      <div class="small">红(近) → 蓝(远)</div>
      <div class="legend"></div>

      <div style="margin-top:8px;">
        <label>开始日期：</label><br />
        <input id="startDate" type="date" />
      </div>
      <div>
        <label>结束日期：</label><br />
        <input id="endDate" type="date" />
      </div>
      <div class="row" style="margin-top:6px;">
        <button id="applyBtn">应用筛选</button>
        <button id="resetBtn">重置</button>
      </div>

      <div class="small" style="margin-top:6px;">
        数据文件：<code>notams.csv</code> + <code>msi.csv</code>
      </div>
      <div class="small" id="status"></div>

      <hr style="margin:8px 0;" />
      <div style="font-size:13px;"><b>🚀 火箭发射（±1周）</b></div>
      <div class="launch-layer-toggle">
        <input type="checkbox" id="launchToggle" checked />
        <label for="launchToggle" style="font-size:12px;">在地图上显示</label>
      </div>
      <div class="legend-launches">
        <div class="legend-row"><span class="dot" style="background:#22c55e; border:1px solid #fff;"></span> 🚀 已发射</div>
        <div class="legend-row"><span class="dot" style="background:#ef2b2b; border:1px solid #fff;"></span> 🚀 即将发射 (近)</div>
        <div class="legend-row"><span class="dot" style="background:#2b5bff; border:1px solid #fff;"></span> 🚀 即将发射 (远)</div>
        <div class="legend-row" style="margin-left:2px;">📡 发射场站</div>
        <div class="legend-row" style="margin-top:5px; border-top:1px solid #eee; padding-top:5px;">
          <div style="width:14px; height:14px; border:0.5px solid #fff; box-shadow:0 0 10px #ff0; border-radius:50%; background:#888; margin-right:6px;"></div>
          <span style="font-size:11px; color:#444;">黄色外发光轮廓 = 处于天文晨昏光 (可见火箭云)</span>
        </div>
      </div>
      <div class="small" id="launchStatus"></div>
    </div>
  </div>

  <div id="map"></div>
  <div id="mapCesium"></div>

  <div class="view-toggle" id="viewToggle">
    <span id="viewToggleIcon">🌍</span>
    <span id="viewToggleText">3D 地球模式</span>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js"></script>
  <script>
    const map = L.map('map', { zoomControl: false }).setView([34.5, 108.5], 4);
    L.control.zoom({ position: 'topright' }).addTo(map);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const statusEl = document.getElementById('status');
    const panel = document.getElementById('mainPanel');
    const panelToggle = document.getElementById('panelToggle');
    const viewToggle = document.getElementById('viewToggle');
    const viewToggleIcon = document.getElementById('viewToggleIcon');
    const viewToggleText = document.getElementById('viewToggleText');
    const mapDiv = document.getElementById('map');
    const cesiumDiv = document.getElementById('mapCesium');

    let is3D = false;
    let cesiumViewer = null;

    function initCesium() {
      if (cesiumViewer) return;
      cesiumViewer = new Cesium.Viewer('mapCesium', {
        animation: false, timeline: false, infoBox: true, selectionIndicator: true,
        navigationHelpButton: false, sceneModePicker: false, baseLayerPicker: false
      });
      // Enable high-resolution satellite imagery (Async init for Cesium 1.107+)
      cesiumViewer.imageryLayers.removeAll();
      Cesium.ArcGisMapServerImageryProvider.fromUrl(
        'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer',
        { enablePickFeatures: false }
      ).then(provider => {
        cesiumViewer.imageryLayers.addImageryProvider(provider);
      }).catch(err => {
        console.error('ArcGIS Imagery failed:', err);
        // Fallback to OSM
        cesiumViewer.imageryLayers.addImageryProvider(new Cesium.OpenStreetMapImageryProvider({
          url: 'https://a.tile.openstreetmap.org/'
        }));
      });
      // Quality settings
      cesiumViewer.scene.globe.depthTestAgainstTerrain = false;
      if (Cesium.FeatureDetection.supportsImageRenderingPixelated()) {
        cesiumViewer.resolutionScale = window.devicePixelRatio;
      }
      cesiumViewer.scene.postProcessStages.fxaa.enabled = true;
    }

    viewToggle.onclick = () => {
      is3D = !is3D;
      if (is3D) {
        mapDiv.style.display = 'none';
        cesiumDiv.style.display = 'block';
        viewToggleIcon.textContent = '🗺️';
        viewToggleText.textContent = '2D 平面模式';
        initCesium();
        renderOnGlobe(filteredDataRows);
      } else {
        mapDiv.style.display = 'block';
        cesiumDiv.style.display = 'none';
        viewToggleIcon.textContent = '🌍';
        viewToggleText.textContent = '3D 地球模式';
      }
    };

    let upcomingLaunches = [];
    let pastLaunches = [];

    function renderOnGlobe(rows) {
      try {
        if (!cesiumViewer || !rows) return;
        cesiumViewer.entities.removeAll();

        // 1. Render Launch Sites (🚀) - STATIC
        if (launchToggle.checked) {
          Object.entries(launchSites).forEach(([abbrev, site]) => {
            cesiumViewer.entities.add({
              position: Cesium.Cartesian3.fromDegrees(site.lon, site.lat),
              billboard: {
                image: 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><text y="24" font-size="24">📡</text></svg>'))),
                verticalOrigin: Cesium.VerticalOrigin.BOTTOM, width: 24, height: 24
              },
              label: {
                text: site.name, font: '9pt sans-serif',
                style: Cesium.LabelStyle.FILL_AND_OUTLINE, outlineWidth: 1,
                verticalOrigin: Cesium.VerticalOrigin.TOP, pixelOffset: new Cesium.Cartesian2(0, 5)
              }
            });
          });

          // 1b. Render Upcoming Launches (Dynamic)
          upcomingLaunches.forEach(launch => {
            if (!launch.lat || !launch.lon) return;
            const iconColor = launch.color || 'yellow';
            cesiumViewer.entities.add({
              position: Cesium.Cartesian3.fromDegrees(launch.lon, launch.lat),
              billboard: {
                image: 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"><circle cx="20" cy="20" r="18" fill="${iconColor}" stroke="white" stroke-width="2"/><text x="20" y="28" font-size="20" text-anchor="middle">🚀</text></svg>`))),
                verticalOrigin: Cesium.VerticalOrigin.CENTER, width: 32, height: 32
              },
              label: {
                text: '即将: ' + (launch.mission || ''), font: 'bold 10pt sans-serif',
                fillColor: Cesium.Color.fromCssColorString(iconColor), outlineColor: Cesium.Color.BLACK, outlineWidth: 2,
                style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                verticalOrigin: Cesium.VerticalOrigin.TOP, pixelOffset: new Cesium.Cartesian2(0, 16)
              },
              description: `<b>${launch.mission}</b><br/>${launch.dateStr}`
            });
          });

          // 1c. Render Past Launches (Dynamic)
          pastLaunches.forEach(launch => {
            cesiumViewer.entities.add({
              position: Cesium.Cartesian3.fromDegrees(launch.lon, launch.lat),
              billboard: {
                image: 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"><circle cx="20" cy="20" r="18" fill="#22c55e" stroke="white" stroke-width="2"/><text x="20" y="28" font-size="20" text-anchor="middle">🚀</text></svg>'))),
                verticalOrigin: Cesium.VerticalOrigin.CENTER, width: 32, height: 32
              },
              label: {
                text: '已发射: ' + (launch.payload || launch.vehicle), font: '10pt sans-serif',
                fillColor: Cesium.Color.LIME, style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                verticalOrigin: Cesium.VerticalOrigin.TOP, pixelOffset: new Cesium.Cartesian2(0, 16)
              },
              description: `<b>🚀 ${launch.vehicle}</b><br/>载荷: ${launch.payload}<br/>时间: ${launch.dateStr}<br/>结果: ${launch.success}`
            });
          });
        }

        const now = Date.now();
        const times = rows.map(r => Date.parse(r.from_utc)).filter(Number.isFinite);
        const minTs = now; 
        const maxTs = times.length ? Math.max(now + 86400000, ...times) : now + 86400000;

        rows.forEach(r => {
          const lat = parseFloat(r.lat), lon = parseFloat(r.lon);
          if (!isFinite(lat) || !isFinite(lon)) return;

          const fromTs = Date.parse(r.from_utc);
          const isMaritime = r.country === 'Maritime';
          const colorHex = isMaritime ? '#ff9900' : colorByTime(fromTs, minTs, maxTs);
          const color = Cesium.Color.fromCssColorString(colorHex);
          const radiusNm = parseFloat(r.radius_nm || '1');
          const isGlow = isRocketCloudVisible(r.from_utc, r.to_utc, lat, lon);

          // Render Label (Only for NOTAMs, not for Maritime)
          if (!isMaritime) {
            cesiumViewer.entities.add({
              position: Cesium.Cartesian3.fromDegrees(lon, lat),
              label: {
                text: r.notam_id || 'NOTAM',
                font: '8pt sans-serif',
                fillColor: color,
                outlineColor: isGlow ? Cesium.Color.WHITE : Cesium.Color.BLACK,
                outlineWidth: isGlow ? 3 : 2,
                style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                pixelOffset: new Cesium.Cartesian2(0, -10)
              },
              description: r['raw'] || ''
            });
          }

          // Render Polygon/Circle
          let polyCoords = [];
          if (r.polygon) {
             // Handle pre-parsed polygon from CSV (if any)
             try {
                if (r.polygon.trim().startsWith('[')) {
                   let parsed = JSON.parse(r.polygon);
                   if (parsed.length > 0) {
                      if (typeof parsed[0][0] === 'number') polyCoords.push(parsed);
                      else polyCoords = parsed;
                   }
                }
             } catch(e) {}
          }

          if (polyCoords.length === 0) {
             polyCoords = parseNotamPolygons(r.raw || '');
          }

          if (polyCoords.length > 0) {
             polyCoords.forEach(points => {
               const flatPoints = [];
               points.forEach(p => flatPoints.push(p[1], p[0]));
                const entityOptions = {
                  polygon: {
                    hierarchy: Cesium.Cartesian3.fromDegreesArray(flatPoints),
                    material: color.withAlpha(0.3),
                    outline: true,
                    outlineColor: isGlow ? Cesium.Color.YELLOW.withAlpha(0.7) : color,
                    outlineWidth: 1,
                    height: 100
                  },
                  description: r['raw'] || ''
                };
                // Add Glow for outlines in 3D
                if (isGlow) {
                  cesiumViewer.entities.add({
                    polyline: {
                      positions: Cesium.Cartesian3.fromDegreesArray(flatPoints.concat([flatPoints[0], flatPoints[1]])),
                      width: 12,
                      material: new Cesium.PolylineGlowMaterialProperty({
                         glowPower: 0.25,
                         color: Cesium.Color.YELLOW
                      }),
                      height: 110
                    }
                  });
                }
               cesiumViewer.entities.add(entityOptions);
             });
          } else if (radiusNm > 0 && !isMaritime) {
            // Approximate circular area if only radius is given
            cesiumViewer.entities.add({
              position: Cesium.Cartesian3.fromDegrees(lon, lat),
              ellipse: {
                semiMinorAxis: radiusNm * 1852,
                semiMajorAxis: radiusNm * 1852,
                material: color.withAlpha(0.3),
                outline: true,
                outlineColor: isGlow ? Cesium.Color.YELLOW.withAlpha(0.7) : color,
                outlineWidth: 1,
                height: 100
              },
              description: r['raw'] || ''
            });
            if (isGlow) {
              const circlePoints = [];
              for (let i = 0; i <= 360; i += 10) {
                const angle = i * Math.PI / 180;
                const dLat = (radiusNm * 1852 * Math.sin(angle)) / 111320;
                const dLon = (radiusNm * 1852 * Math.cos(angle)) / (111320 * Math.cos(lat * Math.PI / 180));
                circlePoints.push(lon + dLon, lat + dLat);
              }
              cesiumViewer.entities.add({
                polyline: {
                  positions: Cesium.Cartesian3.fromDegreesArray(circlePoints),
                  width: 12,
                  material: new Cesium.PolylineGlowMaterialProperty({
                    glowPower: 0.25,
                    color: Cesium.Color.YELLOW
                  }),
                  height: 110
                }
              });
            }
          }
        });

        console.log(`[Cesium] Success: Rendered ${rows.length} rows, ${upcomingLaunches.length} upcoming, ${pastLaunches.length} past.`);
        if (cesiumViewer.entities.values.length > 0) {
          cesiumViewer.zoomTo(cesiumViewer.entities);
        }
      } catch (cesiumErr) {
        console.error('[Cesium] Render Error:', cesiumErr);
        setStatus('3D模式渲染异常: ' + cesiumErr.message);
      }
    }

    panelToggle.onclick = (e) => {
      e.stopPropagation();
      panel.classList.toggle('collapsed');
    };
    panel.onclick = () => {
      if (panel.classList.contains('collapsed')) panel.classList.remove('collapsed');
    };

    const startEl = document.getElementById('startDate');
    const endEl = document.getElementById('endDate');
    const applyBtn = document.getElementById('applyBtn');
    const resetBtn = document.getElementById('resetBtn');

    let dataRows = [];
    let layers = [];

    function setStatus(txt) { statusEl.textContent = txt; }

    function parseCsv(text) {
      const lines = text.trim().split(/\r?\n/);
      if (lines.length < 2) return [];
      const headers = lines[0].split(',');
      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        const line = lines[i];
        const vals = [];
        let cur = '', inQ = false;
        for (let j = 0; j < line.length; j++) {
          const ch = line[j];
          if (ch === '"') {
            if (inQ && line[j + 1] === '"') { cur += '"'; j++; }
            else inQ = !inQ;
          } else if (ch === ',' && !inQ) {
            vals.push(cur); cur = '';
          } else cur += ch;
        }
        vals.push(cur);
        const o = {};
        if (i === 1) console.log('[CSV] Detected Headers:', headers);
        headers.forEach((h, idx) => {
          const key = h.replace(/^\ufeff/, '').trim();
          if (key) o[key] = (vals[idx] ?? '').trim();
        });
        rows.push(o);
      }
      return rows;
    }

    function colorByTime(fromTs, minTs, maxTs) {
      if (!isFinite(fromTs) || !isFinite(minTs) || !isFinite(maxTs) || maxTs <= minTs) return '#d33';
      const t = (fromTs - minTs) / (maxTs - minTs);
      const r = Math.round(255 * (1 - t) + 43 * t);
      const g = Math.round(43 * (1 - t) + 91 * t);
      const b = Math.round(43 * (1 - t) + 255 * t);
      return `rgb(${r},${g},${b})`;
    }

    function parseCoordinate(s, isLon) {
      let parts = s.split('.');
      let intPart = parts[0];
      let decPart = parts.length > 1 ? '.' + parts[1] : '';

      let d, m, sec = '0';
      if (isLon) {
        if (intPart.length === 4 || intPart.length === 5) {
          m = intPart.slice(-2) + decPart;
          d = intPart.slice(0, -2);
        } else if (intPart.length === 6 || intPart.length === 7) {
          sec = intPart.slice(-2) + decPart;
          m = intPart.slice(-4, -2);
          d = intPart.slice(0, -4);
        } else return null;
      } else {
        if (intPart.length === 3 || intPart.length === 4) {
          m = intPart.slice(-2) + decPart;
          d = intPart.slice(0, -2);
        } else if (intPart.length === 5 || intPart.length === 6) {
          sec = intPart.slice(-2) + decPart;
          m = intPart.slice(-4, -2);
          d = intPart.slice(0, -4);
        } else return null;
      }
      if (d === '') d = '0';
      return parseFloat(d) + parseFloat(m) / 60 + parseFloat(sec) / 3600;
    }

    function parseNotamPolygons(raw) {
      if (!raw) return [];
      let cleanedRaw = raw.replace(/Q\).*?(?=\s*A\))/s, '');

      cleanedRaw = cleanedRaw
        // 1. Normalize dash-separated: 71-01.00N -> 7101.00N
        .replace(/\b(\d{1,3})-(\d{2}(?:[.,]\d+)?)\s*([NSEW])\b/gi, (match, deg, min, hemi) => {
          const h = hemi.toUpperCase();
          const d = deg.padStart((h === 'E' || h === 'W') ? 3 : 2, '0');
          return d + min.replace(',', '.') + h;
        })
        // 2. Normalize space-separated: 71 01 00 N -> 710100N
        .replace(/\b(\d{2,3})\s+(\d{2}(?:[.,]\d+)?)(?:\s+(\d{2}(?:[.,]\d+)?))?\s*([NSEW])\b/gi, (match, d, m, s, hemi) => {
          return d + m + (s || '') + hemi.toUpperCase();
        })
        .replace(/(^|[\s,-])([NSEW])\s*(\d{2,3})\s+(\d{2}(?:[.,]\d+)?)(?:\s+(\d{2}(?:[.,]\d+)?))?\b/gi, (match, pref, hemi, d, m, s) => {
          return pref + hemi.toUpperCase() + d + m + (s || '');
        });

      const regex = /(?:([NS])\s*(\d{4,6}(?:[.,]\d+)?))\s*(?:([EW])\s*(\d{5,7}(?:[.,]\d+)?))|(?:(\d{4,6}(?:[.,]\d+)?)\s*([NS]))\s*(?:(\d{5,7}(?:[.,]\d+)?)\s*([EW]))/gi;
      const matches = [...cleanedRaw.matchAll(regex)];
      if (matches.length < 2) return [];

      const groups = {};
      for (const m of matches) {
        let isHemiFirst = !!m[1];
        let latHemi = (m[1] || m[6]).toUpperCase();
        let latStr = (m[2] || m[5]).replace(',', '.');
        let lonHemi = (m[3] || m[8]).toUpperCase();
        let lonStr = (m[4] || m[7]).replace(',', '.');

        let latIntLen = latStr.split('.')[0].length;
        let lonIntLen = lonStr.split('.')[0].length;
        let latType = (latIntLen > 4) ? 'SEC' : 'MIN';
        let lonType = (lonIntLen > 5) ? 'SEC' : 'MIN';
        let matchType = (isHemiFirst ? 'PRE' : 'SUF') + '_' + latType + '_' + lonType;

        let latObj = parseCoordinate(latStr, false);
        let lonObj = parseCoordinate(lonStr, true);
        if (latObj === null || lonObj === null) continue;

        let lat = latObj;
        if (latHemi === 'S') lat = -lat;
        let lon = lonObj;
        if (lonHemi === 'W') lon = -lon;

        if (!groups[matchType]) groups[matchType] = [];
        groups[matchType].push({ lat: lat, lon: lon, index: m.index });
      }

      let allValidSubGroups = [];
      for (const t in groups) {
        let currentSubGroup = [];
        let lastIndex = -1;
        for (const pt of groups[t]) {
          if (lastIndex === -1 || (pt.index - lastIndex) < 150) {
            currentSubGroup.push([pt.lat, pt.lon]);
          } else {
            if (currentSubGroup.length >= 2) allValidSubGroups.push(currentSubGroup);
            currentSubGroup = [[pt.lat, pt.lon]];
          }
          lastIndex = pt.index;
        }
        if (currentSubGroup.length >= 2) allValidSubGroups.push(currentSubGroup);
      }
      return allValidSubGroups;
    }

    function isRocketCloudVisible(fromStr, toStr, lat, lon) {
      if (!fromStr || !toStr || !isFinite(lat)) return false;
      try {
        const from = new Date(fromStr).getTime();
        const to = new Date(toStr).getTime();
        
        // 增加 12 小时限制：如果持续时间超过 12 小时，则认为不是典型的发射窗口，不显示发光效果
        if (to - from > 12 * 3600 * 1000) return false;

        const checkDays = [];
        const fromDate = new Date(from);
        const toDate = new Date(to);

        checkDays.push(fromDate);
        if (toDate.getTime() > fromDate.getTime() && fromDate.getUTCDate() !== toDate.getUTCDate()) {
          checkDays.push(toDate);
        }

        for (const d of checkDays) {
          const times = SunCalc.getTimes(d, lat, lon);
          const isOverlap = (s1, e1, s2, e2) => s1 <= e2 && e1 >= s2;
          if (isOverlap(from, to, times.sunset, times.astronomicalDusk) || 
              isOverlap(from, to, times.astronomicalDawn, times.sunrise)) return true;
        }
        return false;
      } catch(e) { return false; }
    }

    function clearLayers() {
      layers.forEach(l => map.removeLayer(l));
      layers = [];
    }

    let filteredDataRows = [];

    function renderRows(rows) {
      filteredDataRows = rows;
      if (is3D) {
        renderOnGlobe(rows);
      }

      clearLayers();
      if (!rows.length) {
        setStatus('当前筛选无数据');
        return;
      }

      const now = Date.now();
      const times = rows.map(r => Date.parse(r.from_utc)).filter(Number.isFinite);
      const minTs = now;
      const maxTs = times.length ? Math.max(now + 86400000, ...times) : now + 86400000;

      const group = L.featureGroup();
      rows.forEach(r => {
        const lat = parseFloat(r.lat), lon = parseFloat(r.lon);
        const radiusNm = Math.max(1, parseFloat(r.radius_nm || '1'));
        if (!isFinite(lat) || !isFinite(lon)) return;
        const isMaritime = r.country === 'Maritime';
        const color = isMaritime ? '#ff9900' : colorByTime(Date.parse(r.from_utc), minTs, maxTs);

        let coordinatesList = [];
        if (r.polygon) {
          try {
            if (r.polygon.trim().startsWith('[')) {
              let parsed = JSON.parse(r.polygon);
              if (parsed.length > 0) {
                if (typeof parsed[0][0] === 'number') coordinatesList.push(parsed);
                else coordinatesList = parsed;
              }
            } else {
              const pts = r.polygon.split(/[ ;|]/).filter(Boolean);
              let coords = pts.map(p => {
                const parts = p.split(',');
                return [parseFloat(parts[0]), parseFloat(parts[1])];
              }).filter(p => isFinite(p[0]) && isFinite(p[1]));
              if (coords.length >= 2) coordinatesList.push(coords);
            }
          } catch (e) { }
        }

        if (coordinatesList.length === 0) {
          coordinatesList = parseNotamPolygons(r.raw);
        }

        const popup = `
          <b>${r.notam_id || (isMaritime ? 'Maritime Warning' : '')}</b><br/>
          ${isMaritime ? '<b style="color:#ff9900;">[Maritime NavWarning]</b><br/>' : ''}
          FIR: ${r.fir || ''}<br/>
          from: ${r.from_utc || ''}<br/>
          to: ${r.to_utc || ''}<br/>
          qcode: ${r.qcode || ''}<br/>
          <hr/>
          <div style="max-width:420px;max-height:260px;overflow:auto;white-space:pre-wrap;">${(r.raw || '').replace(/</g, '&lt;')}</div>
        `;

        const isGlow = isRocketCloudVisible(r.from_utc, r.to_utc, lat, lon);
        const pathOptions = { 
          color, fillColor: color, fillOpacity: 0.2, 
          weight: isGlow ? 0.7 : 2, 
          className: isGlow ? 'glow-path' : ''
        };

        if (coordinatesList.length > 0) {
          const rawText = r.raw || '';
          const isRoute = /RTE\b|ROUTE\b|AWY\b|TRACK\b|CORRIDOR\b/i.test(rawText) && !/AREA\b|POLYGON\b|BOUNDED\b/i.test(rawText);

          coordinatesList.forEach(pts => {
            let shape;
            if (pts.length >= 3 && !isRoute) {
              shape = L.polygon(pts, pathOptions);
            } else if (pts.length >= 2) {
              shape = L.polyline(pts, { ...pathOptions, weight: isGlow ? 5 : 3 });
            }
            if (shape) {
              shape.bindPopup(popup);
              shape.addTo(group);
              layers.push(shape);
            }
          });
        } else {
          let shape;
          if (isMaritime && !r.radius_nm) {
            shape = L.circleMarker([lat, lon], {
              radius: 6, color, fillColor: color, fillOpacity: 0.8, weight: isGlow ? 3 : 2,
              shadowBlur: isGlow ? 10 : 0, shadowColor: '#fff'
            });
          } else {
            shape = L.circle([lat, lon], {
              ...pathOptions, radius: radiusNm * 1852
            });
          }
          shape.bindPopup(popup);
          shape.addTo(group);
          layers.push(shape);
        }
      });

      if (layers.length) {
        group.addTo(map);
        try { map.fitBounds(group.getBounds(), { padding: [20, 20] }); } catch (e) { }
      }
      const notamCount = rows.filter(r => r.country !== 'Maritime').length;
      const msiCount = rows.filter(r => r.country === 'Maritime').length;
      setStatus(`已加载 ${rows.length} 条记录（航空 NOTAM: ${notamCount} | 海事警告: ${msiCount}）`);
    }

    function isoDate(d) { return d.toISOString().slice(0, 10); }
    function plusDays(dateStr, n) {
      const d = new Date(dateStr + 'T00:00:00Z');
      d.setUTCDate(d.getUTCDate() + n);
      return isoDate(d);
    }

    function askStartDateDefault() {
      const remembered = localStorage.getItem('notam_start_date') || '';
      const fallback = remembered || isoDate(new Date());
      const v = prompt('请输入开始日期（YYYY-MM-DD）', fallback);
      if (v && /^\d{4}-\d{2}-\d{2}$/.test(v)) {
        startEl.value = v;
        endEl.value = plusDays(v, 5);
        localStorage.setItem('notam_start_date', v);
      } else if (fallback && /^\d{4}-\d{2}-\d{2}$/.test(fallback)) {
        startEl.value = fallback;
        endEl.value = plusDays(fallback, 5);
      }
    }

    function applyFilter() {
      if (!dataRows.length) return;
      const s = startEl.value ? new Date(startEl.value + 'T00:00:00Z').getTime() : -Infinity;
      const e = endEl.value ? new Date(endEl.value + 'T23:59:59Z').getTime() : Infinity;
      const filtered = dataRows.filter(r => {
        const isMaritime = r.country === 'Maritime';
        
        // MSI: 使用重叠逻辑 (AlertStart <= SelectedEnd && AlertEnd >= SelectedStart)
        if (isMaritime) {
          const t1 = r.from_utc ? Date.parse(r.from_utc) : -Infinity;
          const t2 = r.to_utc ? Date.parse(r.to_utc) : (r.from_utc ? t1 + 86400000 * 365 : Infinity);
          if (!isFinite(t1) && !isFinite(t2)) return true;
          return t1 <= e && t2 >= s;
        } 
        
        // NOTAM/Legacy: 恢复到 ZIP 中的“开始日期在范围内”逻辑
        if (!r.from_utc) return true;
        const t = Date.parse(r.from_utc);
        if (!isFinite(t)) return true;
        return t >= s && t <= e;
      });
      if (startEl.value) localStorage.setItem('notam_start_date', startEl.value);
      renderRows(filtered);
    }

    applyBtn.addEventListener('click', applyFilter);
    resetBtn.addEventListener('click', () => {
      startEl.value = '';
      endEl.value = '';
      renderRows(dataRows);
    });

    // Load both CSVs in parallel and merge
    async function loadBothCsvs() {
      let notamRows = [], msiRows = [];
      const [notamResp, msiResp] = await Promise.allSettled([
        fetch('./notams.csv', { cache: 'no-store' }),
        fetch('./msi.csv', { cache: 'no-store' })
      ]);

      if (notamResp.status === 'fulfilled' && notamResp.value.ok) {
        const text = await notamResp.value.text();
        notamRows = parseCsv(text).map(r => ({ ...r, type: 'NOTAM', lat: r.lat || r.Latitude, lon: r.lon || r.Longitude }));
        console.log(`[notams.csv] Loaded ${notamRows.length} rows`);
      } else {
        console.warn('[notams.csv] Failed to load');
      }

      if (msiResp.status === 'fulfilled' && msiResp.value.ok) {
        const text = await msiResp.value.text();
        msiRows = parseCsv(text).map(r => ({ ...r, type: 'MSI', lat: r.lat || r.Latitude, lon: r.lon || r.Longitude }));
        console.log(`[msi.csv] Loaded ${msiRows.length} rows`);
      } else {
        console.warn('[msi.csv] Failed to load');
      }

      dataRows = [...notamRows, ...msiRows];
      if (dataRows.length > 0) {
        askStartDateDefault();
        applyFilter();
        return true;
      }
      return false;
    }

    async function loadKmlFallback() {
      const layer = omnivore.kml('./notams.kml').on('ready', function () {
        try { map.fitBounds(layer.getBounds(), { padding: [20, 20] }); } catch (e) { }
        setStatus('CSV不可用，已回退显示 notams.kml');
      }).on('error', function (e) {
        console.error(e);
        setStatus('所有数据源均加载失败');
      }).addTo(map);
      layers.push(layer);
    }

    // ═══════════════════════════════════════════════════════
    // ROCKET LAUNCH LAYER
    // ═══════════════════════════════════════════════════════
    const LAUNCH_SITES_URL = './launch_sites.csv';
    const LAUNCH_LOG_URL = './past_launches.csv';
    const RLL_UPCOMING_URL = 'https://fdo.rocketlaunch.live/json/launches/next/5';

    // Location slug (from RocketLaunch.Live) → {lat, lon}
    // Built by merging API response pad.location.slug with known coordinates.
    const RLL_LOC_COORDS = {
      'baikonur-cosmodrome': { lat: 45.6, lon: 63.4 },
      'cape-canaveral-sfs': { lat: 28.391, lon: -80.588 },
      'cape-canaveral': { lat: 28.391, lon: -80.588 },
      'kennedy-space-center': { lat: 28.573, lon: -80.648 },
      'vandenberg-sfb': { lat: 34.4, lon: -120.35 },
      'vandenberg-space-force-base': { lat: 34.4, lon: -120.35 },
      'guiana-space-centre': { lat: 5.232, lon: -52.776 },
      'jiuquan-satellite-launch-center': { lat: 40.6, lon: 99.9 },
      'xichang-satellite-launch-center': { lat: 28.25, lon: 102 },
      'taiyuan-satellite-launch-center': { lat: 37.5, lon: 112.6 },
      'wenchang-space-launch-site': { lat: 19.615, lon: 110.951 },
      'satish-dhawan-space-centre': { lat: 13.9, lon: 80.4 },
      'baikonur': { lat: 45.6, lon: 63.4 },
      'plesetsk-cosmodrome': { lat: 62.8, lon: 40.1 },
      'tanegashima-space-center': { lat: 30.4, lon: 131.0 },
      'uchinoura-space-center': { lat: 31.2, lon: 131.1 },
      'naro-space-center': { lat: 34.432, lon: 127.535 },
      'mahia-peninsula': { lat: -39.261, lon: 177.865 },
      'rocket-lab-launch-complex-mahia-peninsula': { lat: -39.261, lon: 177.865 },
      'andoya': { lat: 69.294, lon: 16.020 },
      'esrange-space-center': { lat: 67.893, lon: 21.101 },
      'wallops-flight-facility': { lat: 37.833, lon: -75.483 },
      'mid-atlantic-regional-spaceport': { lat: 37.833, lon: -75.483 },
      'sea-launch': { lat: 0.0, lon: -154.0 },
      'yellow-sea': { lat: 34.5, lon: 122.0 },
      'imam-khomeini-space-center': { lat: 35.235, lon: 53.921 },
      'starbase': { lat: 25.997, lon: -97.156 },
      'boca-chica': { lat: 25.997, lon: -97.156 },
    };

    const launchStatusEl = document.getElementById('launchStatus');
    const launchToggle = document.getElementById('launchToggle');

    let launchLayerGroup = L.layerGroup().addTo(map);
    let launchSites = {}; // abbrev -> {lat, lon, name}
    // Also build a by-name index for RLL lookups
    let launchSitesByName = {}; // partial name -> {lat, lon}

    function parseLaunchDate(s) {
      if (!s) return null;
      const clean = s.trim().toUpperCase();
      // Expecting "2026 MAR 20 0000" or similar
      const m = clean.match(/^(\d{4})\s+([A-Z]{3})\s+(\d{1,2})\s+(\d{2})(\d{2})/);
      // Fallback for different separators
      const m2 = clean.match(/(\d{4})\s+(\d{1,2})\s+([A-Z]{3})/);
      if (!m && !m2) return new Date(s);

      if (m) {
        const year = parseInt(m[1]), monStr = m[2], day = parseInt(m[3]);
        const hour = parseInt(m[4]), min = parseInt(m[5]);
        const months = {
          'JAN': 0, 'FEB': 1, 'MAR': 2, 'APR': 3, 'MAY': 4, 'JUN': 5,
          'JUL': 6, 'AUG': 7, 'SEP': 8, 'OCT': 9, 'NOV': 10, 'DEC': 11
        };
        const month = months[monStr];
        if (month === undefined) return new Date(s); // Fallback
        return new Date(Date.UTC(year, month, day, hour, min));
      }
      return new Date(s); // Final Fallback
    }

    function launchColor(date, now, minTs, maxTs) {
      if (!date || !isFinite(date.getTime())) return 'rgb(43, 91, 255)'; // TBD = Blue/Far
      if (date < now && !minTs) return '#22c55e'; // Only for past CSV if no range provided
      
      const ts = date.getTime();
      const s = minTs || now.getTime();
      const e = maxTs || (s + 7 * 86400000);
      
      if (e <= s) return 'rgb(255, 43, 43)';
      const t = Math.max(0, Math.min((ts - s) / (e - s), 1));
      const r = Math.round(255 * (1 - t) + 43 * t);
      const g = Math.round(43 * (1 - t) + 91 * t);
      const b = Math.round(43 * (1 - t) + 255 * t);
      return `rgb(${r},${g},${b})`;
    }

    function parseDescriptionDate(desc) {
      if (!desc) return null;
      // Matches "March 22, 2026 at 3:45 PM (UTC)"
      const m = desc.match(/([A-Z][a-z]+)\s+(\d{1,2}),\s+(\d{4})\s+at\s+(\d{1,2}):(\d{2})\s+([AP]M)/i);
      if (!m) return null;
      const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
      const monStr = m[1].substring(0, 3).toUpperCase();
      const month = months.indexOf(monStr);
      if (month === -1) return null;
      let hr = parseInt(m[4]);
      if (m[6].toUpperCase() === 'PM' && hr < 12) hr += 12;
      if (m[6].toUpperCase() === 'AM' && hr === 12) hr = 0;
      return new Date(Date.UTC(parseInt(m[3]), month, parseInt(m[2]), hr, parseInt(m[5])));
    }

    function coordsForRllLoc(padLoc) {
      if (!padLoc) return null;
      const slug = (padLoc.slug || '').toLowerCase();
      const name = (padLoc.name || '').toLowerCase();
      if (RLL_LOC_COORDS[slug]) return RLL_LOC_COORDS[slug];
      // Fuzzy fallback: check if any key is contained in the location name
      for (const [k, v] of Object.entries(RLL_LOC_COORDS)) {
        if (name.includes(k) || k.includes(name.replace(/\s+/g, '-'))) return v;
      }
      // Final fallback: check against GitHub launch sites by name keywords
      for (const [abbrev, site] of Object.entries(launchSites)) {
        const siteName = site.name.toLowerCase();
        if (siteName.includes(name.substring(0, 8)) || name.includes(siteName.substring(0, 8))) {
          return { lat: site.lat, lon: site.lon };
        }
      }
      return null;
    }

    async function loadLaunchData() {
      launchStatusEl.textContent = '加载火箭数据…';
      try {
        // 1. Load launch sites from GitHub (purple background markers)
        const sitesResp = await fetch(LAUNCH_SITES_URL, { cache: 'no-store' });
        const sitesText = await sitesResp.text();
        const sitesRows = parseCsv(sitesText);
        sitesRows.forEach(row => {
          const abbrev = (row['abbreviation'] || '').trim();
          const lat = parseFloat(row['latitude']);
          const lon = parseFloat(row['longitude']);
          if (abbrev && isFinite(lat) && isFinite(lon)) {
            launchSites[abbrev] = { lat, lon, name: (row['name'] || abbrev).trim() };
          }
        });
        console.log(`[launches] Loaded ${Object.keys(launchSites).length} launch sites`);

        launchLayerGroup.clearLayers();

        // 2. Draw launch site markers (📡)
        Object.entries(launchSites).forEach(([abbrev, site]) => {
          const siteIcon = L.divIcon({
            html: '<div style="font-size: 20px; line-height: 1;">📡</div>',
            className: 'launch-site-icon',
            iconSize: [24, 24],
            iconAnchor: [12, 12]
          });
          const m = L.marker([site.lat, site.lon], { icon: siteIcon });
          m.bindTooltip(site.name, { permanent: false, direction: 'top' });
          m.addTo(launchLayerGroup);
        });

        // 3. Fetch upcoming launches from RocketLaunch.Live (free: next 5)
        const now = new Date();
        let upcomingCount = 0;
        try {
          upcomingLaunches = [];
          const rllResp = await fetch(RLL_UPCOMING_URL, { cache: 'no-store' });
          const rllData = await rllResp.json();
          const list = rllData.result || [];
          upcomingLaunches = [];

          const upcomingTimes = list.map(l => {
            const d = l.win_open ? new Date(l.win_open) : parseDescriptionDate(l.launch_description);
            return (d && isFinite(d.getTime())) ? d.getTime() : null;
          }).filter(t => t);
          const minLaunchTs = upcomingTimes.length ? Math.min(...upcomingTimes) : now.getTime();
          const maxLaunchTs = upcomingTimes.length ? Math.max(...upcomingTimes) : now.getTime() + 86400000;

          list.forEach((l, idx) => {
            const loc = l.pad?.location;
            const slug = loc?.slug;
            let lat = loc?.latitude, lon = loc?.longitude;
            if (!lat && loc) {
              const coords = coordsForRllLoc(loc);
              if (coords) { lat = coords.lat; lon = coords.lon; }
            }
            if (!lat) return;

            const missionName = l.name || '未知任务';
            const vehicleName = l.vehicle?.name || '';
            const locName = loc?.name || '';
            const padName = l.pad?.name || '';
            const t0 = l.win_open ? new Date(l.win_open) : parseDescriptionDate(l.launch_description);
            const dateStr = t0 ? t0.toISOString().replace('T', ' ').slice(0, 16) + ' UTC' : '时间待定';
            const weather = l.weather_temp ? ` (${l.weather_temp}°C ${l.weather_condition || ''})` : '';
            const desc = l.launch_description || '';
            const rllUrl = `https://www.rocketlaunch.live/launch/${l.slug}`;

            const color = launchColor(t0, now, minLaunchTs, maxLaunchTs);

            const lIcon = L.divIcon({
              html: `<div style="background:${color}; width:24px; height:24px; border-radius:50%; border:2px solid #fff; display:flex; align-items:center; justify-content:center; font-size:14px;">🚀</div>`,
              className: 'launch-upcoming-icon',
              iconSize: [28, 28],
              iconAnchor: [14, 14]
            });
            const lMarker = L.marker([lat, lon], { icon: lIcon });
            lMarker.bindPopup(`
              <div style="font-size:12px;color:#666;">即将发射</div>
              <b style="color:${color}">${missionName}</b><br/>
              发射场: ${locName}${padName ? ' / ' + padName : ''}<br/>
              时间: ${dateStr}${weather}<br/>
              ${desc ? '<hr/><div style="max-width:320px;max-height:120px;overflow:auto;font-size:11px;">' + desc + '</div>' : ''}
              <a href="${rllUrl}" target="_blank" style="font-size:11px;">🔗 详情 / 直播</a><br/>
              <small style="color:#888;">Data by RocketLaunch.Live</small>
            `, { maxWidth: 340 });
            lMarker.addTo(launchLayerGroup);
            upcomingLaunches.push({ lat, lon, mission: missionName, vehicle: vehicleName, dateStr, color });
            upcomingCount++;
          });
        } catch (rllErr) {
          console.warn('[RLL] Failed to fetch upcoming launches:', rllErr);
        }

        // 4. Load historical CSV (all data)
        let pastCount = 0;
        pastLaunches = [];
        try {
          const logResp = await fetch(LAUNCH_LOG_URL, { cache: 'no-store' });
          const logText = await logResp.text();
          const logRows = parseCsv(logText);

          logRows.forEach(row => {
            const dStr = row['Launch Date and Time (UTC)'];
            const d = parseLaunchDate(dStr);
            if (!d) return;

            const abbrev = (row['Launch Site (Abbrv.)'] || '').trim();
            let lat = parseFloat(row['Latitude']);
            let lon = parseFloat(row['Longitude']);
            if (!isFinite(lat) || !isFinite(lon)) {
              const site = launchSites[abbrev];
              if (site) { lat = site.lat; lon = site.lon; }
            }
            if (!isFinite(lat) || !isFinite(lon)) return;

            const vehicle = row['Launch Vehicle'] || '未知';
            const payload = row['Official Payload Name'] || '';
            const successText = row['Success'] === 'S' ? '✅ 成功' : row['Success'] === 'F' ? '❌ 失败' : '?';
            const dateStr = d.toISOString().replace('T', ' ').slice(0, 16) + ' UTC';

            const pIcon = L.divIcon({
              html: `<div style="background:#22c55e; width:24px; height:24px; border-radius:50%; border:2px solid #fff; display:flex; align-items:center; justify-content:center; font-size:14px;">🚀</div>`,
              className: 'launch-past-icon',
              iconSize: [28, 28],
              iconAnchor: [14, 14]
            });
            const marker = L.marker([lat, lon], { icon: pIcon });
            marker.bindPopup(`
              <div style="font-size:12px;color:#666;">历史发射</div>
              <b style="color:#16a34a;">🚀 ${vehicle}</b><br/>
              载荷: ${payload}<br/>
              发射场: ${row['Launch Site (Full)'] || abbrev}<br/>
              时间: ${dateStr}<br/>
              结果: ${successText}
            `);
            marker.addTo(launchLayerGroup);
            pastLaunches.push({ lat, lon, vehicle, payload, dateStr, success: successText });
            pastCount++;
          });
        } catch (csvErr) {
          console.warn('[launches] Past CSV failed:', csvErr);
        }

        launchStatusEl.textContent = `🚀 ${upcomingCount} 计划 / ${pastCount} 过去 / ${Object.keys(launchSites).length} 发射场`;

        if (is3D) renderOnGlobe(filteredDataRows);
      } catch (err) {
        console.error('[launches] Error:', err);
        launchStatusEl.textContent = '加载失败';
      }
    }

    launchToggle.onchange = () => {
      if (launchToggle.checked) {
        map.addLayer(launchLayerGroup);
      } else {
        map.removeLayer(launchLayerGroup);
      }
      if (is3D) renderOnGlobe(filteredDataRows);
    };

    loadLaunchData();

    (async () => {
      const ok = await loadBothCsvs();
      if (!ok) await loadKmlFallback();
    })();
  </script>
